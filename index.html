<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>МВКО — тренажёр для экзамена</title>
<style>
  :root {
    --bg:#f4f6fb; --card:#fff; --text:#1f2733; --muted:#6b7785;
    --primary:#3b6fed; --primary-dark:#2c55c0;
    --green:#1faa4d; --green-bg:#e4f7ea; --red:#d83a3a; --red-bg:#fce4e4;
    --border:#dde3ec;
  }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,"Segoe UI",Roboto,Arial,sans-serif; background:var(--bg); color:var(--text); line-height:1.5; }
  .wrap { max-width:780px; margin:0 auto; padding:24px 16px 80px; }
  h1 { font-size:24px; margin:0 0 4px; }
  .sub { color:var(--muted); margin:0 0 22px; font-size:14px; }
  .menu { display:grid; gap:12px; }
  .mode-btn { display:flex; flex-direction:column; gap:4px; text-align:left; background:var(--card);
    border:1px solid var(--border); border-radius:14px; padding:18px 20px; cursor:pointer; transition:.15s; font:inherit; color:inherit; }
  .mode-btn:hover { border-color:var(--primary); transform:translateY(-1px); box-shadow:0 6px 18px rgba(59,111,237,.12); }
  .mode-btn .title { font-size:17px; font-weight:600; }
  .mode-btn .desc { font-size:13px; color:var(--muted); }
  .mode-btn .badge { font-size:12px; color:var(--primary); font-weight:600; }
  .topbar { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:18px; }
  .progress { font-size:14px; color:var(--muted); }
  .btn { background:var(--primary); color:#fff; border:none; border-radius:10px; padding:11px 20px; font-size:15px; font-weight:600; cursor:pointer; transition:.15s; }
  .btn:hover { background:var(--primary-dark); }
  .btn:disabled { opacity:.5; cursor:not-allowed; }
  .btn.ghost { background:transparent; color:var(--primary); border:1px solid var(--border); }
  .btn.ghost:hover { border-color:var(--primary); background:#f0f4ff; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:24px; box-shadow:0 4px 20px rgba(20,40,80,.05); }
  .qtext { font-size:18px; font-weight:600; margin:0 0 8px; }
  .qnum { font-size:12px; color:var(--muted); font-weight:600; }
  .hint { font-size:13px; color:var(--muted); margin:0 0 18px; }
  .options { display:grid; gap:10px; }
  .opt { display:flex; align-items:flex-start; gap:12px; border:2px solid var(--border); border-radius:12px; padding:14px 16px; cursor:pointer; transition:.12s; background:#fff; }
  .opt:hover { border-color:var(--primary); }
  .opt.selected { border-color:var(--primary); background:#f0f4ff; }
  .opt input { margin-top:3px; width:18px; height:18px; flex:none; accent-color:var(--primary); }
  .opt .label { flex:1; }
  .opt.correct { border-color:var(--green); background:var(--green-bg); }
  .opt.wrong { border-color:var(--red); background:var(--red-bg); }
  .opt.locked { cursor:default; }
  .mark { font-weight:700; margin-left:6px; white-space:nowrap; }
  .mark.ok { color:var(--green); } .mark.no { color:var(--red); }
  .verdict { margin:18px 0 0; padding:14px 16px; border-radius:12px; font-weight:600; }
  .verdict.ok { background:var(--green-bg); color:var(--green); }
  .verdict.no { background:var(--red-bg); color:var(--red); }
  .theory { margin-top:14px; padding:16px; background:#f7f9fc; border-left:4px solid var(--primary); border-radius:8px; }
  .theory .t-title { font-size:13px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); margin-bottom:6px; }
  .actions { display:flex; gap:10px; margin-top:20px; flex-wrap:wrap; }
  .footer-link { display:inline-block; margin-top:22px; color:var(--muted); font-size:14px; cursor:pointer; text-decoration:underline; }
  .result-big { text-align:center; padding:30px 10px; }
  .result-big .pct { font-size:48px; font-weight:800; }
  .theme-list { display:grid; gap:10px; }
  .theme-row { display:flex; justify-content:space-between; align-items:center; gap:12px; }
  .all-q { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px 18px; margin-bottom:12px; }
  .all-q .qh { font-weight:600; margin-bottom:8px; }
  .all-q .ao { padding:4px 0; }
  .all-q .ao.c { color:var(--green); font-weight:600; }
  .filterbar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
  .chip { border:1px solid var(--border); background:#fff; border-radius:999px; padding:6px 14px; font-size:13px; cursor:pointer; }
  .chip.active { background:var(--primary); color:#fff; border-color:var(--primary); }
  .hidden { display:none; }
  /* Логин */
  .login-wrap { max-width:380px; margin:80px auto 0; padding:0 16px; }
  .login-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:28px 26px; box-shadow:0 4px 20px rgba(20,40,80,.05); }
  .login-card h2 { margin:0 0 6px; font-size:22px; }
  .login-card .sub { margin:0 0 22px; }
  .field { margin-bottom:14px; }
  .field label { display:block; font-size:13px; color:var(--muted); margin-bottom:6px; }
  .field input { width:100%; padding:11px 14px; border:1px solid var(--border); border-radius:10px; font-size:15px; font-family:inherit; background:#fff; color:var(--text); }
  .field input:focus { outline:none; border-color:var(--primary); }
  .login-err { color:var(--red); font-size:13px; margin:0 0 12px; min-height:18px; }
  .who { font-size:13px; color:var(--muted); }
  .who b { color:var(--text); }
  .sync-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#c0c5ce; margin-right:6px; vertical-align:middle; }
  .sync-dot.ok { background:var(--green); } .sync-dot.busy { background:#d99100; }
</style>
</head>
<body>

<!-- ЛОГИН -->
<div id="login" class="login-wrap">
  <div class="login-card">
    <h2>МВКО — вход</h2>
    <p class="sub">Прогресс и ошибки сохраняются между устройствами.</p>
    <div class="field">
      <label for="loginUser">Логин</label>
      <input id="loginUser" type="text" autocomplete="username" autocapitalize="off" spellcheck="false">
    </div>
    <div class="field">
      <label for="loginPass">Пароль</label>
      <input id="loginPass" type="password" autocomplete="current-password">
    </div>
    <p class="login-err" id="loginErr"></p>
    <button class="btn" id="loginBtn" style="width:100%">Войти</button>
  </div>
</div>

<div class="wrap hidden" id="app">

  <!-- МЕНЮ -->
  <div id="menu">
    <div class="topbar" style="margin-bottom:8px">
      <span class="who"><span id="syncDot" class="sync-dot"></span>Вы: <b id="whoami">—</b></span>
      <button class="btn ghost" onclick="logout()">Выйти</button>
    </div>
    <h1>МВКО — тренажёр</h1>
    <p class="sub">Готово вопросов с ответами: <b id="readyCount">0</b> из <b id="totalCount">0</b></p>
    <div class="menu">
      <button class="mode-btn" onclick="startExam()">
        <span class="title">📝 Экзамен</span>
        <span class="desc">До 200 случайных вопросов с сохранением пропорций тем (как в реальном тесте).</span>
      </button>
      <button class="mode-btn" onclick="show('themes')">
        <span class="title">📚 Тренировка по темам</span>
        <span class="desc">Выбери тему — вопросы по ней в случайном порядке.</span>
      </button>
      <button class="mode-btn" onclick="startMistakes()">
        <span class="title">❌ Работа над ошибками</span>
        <span class="desc">Только вопросы, в которых ты ошибся.</span>
        <span class="badge" id="mistakesBadge"></span>
      </button>
      <button class="mode-btn" onclick="showAll()">
        <span class="title">📖 Все вопросы и ответы</span>
        <span class="desc">Список всех вопросов с правильными ответами и пояснениями.</span>
      </button>
    </div>
    <span class="footer-link" onclick="resetMistakes()">Очистить список ошибок</span>
  </div>

  <!-- ВЫБОР ТЕМЫ -->
  <div id="themes" class="hidden">
    <div class="topbar"><button class="btn ghost" onclick="goMenu()">← В меню</button><span class="progress">Выбор темы</span></div>
    <div class="card"><div class="theme-list" id="themeList"></div></div>
  </div>

  <!-- ВОПРОС -->
  <div id="quiz" class="hidden">
    <div class="topbar">
      <button class="btn ghost" onclick="goMenu()">← В меню</button>
      <span class="progress" id="progress"></span>
    </div>
    <div class="card">
      <div class="qnum" id="qnum"></div>
      <p class="qtext" id="qtext"></p>
      <p class="hint" id="hint"></p>
      <div class="options" id="options"></div>
      <div id="verdict"></div>
      <div id="theory"></div>
      <div class="actions" id="actions"></div>
    </div>
  </div>

  <!-- РЕЗУЛЬТАТ -->
  <div id="result" class="hidden">
    <div class="topbar"><button class="btn ghost" onclick="goMenu()">← В меню</button></div>
    <div class="card result-big">
      <div class="pct" id="resPct"></div>
      <p id="resText"></p>
      <div class="actions" style="justify-content:center">
        <button class="btn" onclick="goMenu()">В меню</button>
        <button class="btn ghost" id="reviewBtn">Решить ошибки этого прохода</button>
      </div>
    </div>
  </div>

  <!-- ВСЕ ВОПРОСЫ -->
  <div id="all" class="hidden">
    <div class="topbar"><button class="btn ghost" onclick="goMenu()">← В меню</button><span class="progress" id="allCount"></span></div>
    <div class="filterbar" id="allFilter"></div>
    <div id="allList"></div>
  </div>

</div>

<script src="questions.js"></script>
<script src="answers.js"></script>

<script type="module">

const USERS = {

<script>
  const LETTERS = ['А','Б','В','Г','Д','Е'];
  const THEMES = {
    1:'Международная торговля и валютные системы',
    2:'Валютные отношения',
    3:'Мировой финансовый рынок',
    4:'Международные расчёты',
    5:'Международные кредитные отношения'
  };
  const EXAM_SIZE = 200;

  const ALLQ = (window.QUESTIONS || []);
  const ANS = (window.ANSWERS || {});
  const READY = ALLQ.filter(q => ANS[q.n] && Array.isArray(ANS[q.n].c) && ANS[q.n].c.length);

  // ---------- Firebase: пользователь и облачные ошибки ----------
  let currentUser = null;          // объект Firebase user
  let currentLogin = null;         // 'pavlova' | 'bahtinova' | 'malyshev'
  let mistakesMem = [];            // массив номеров вопросов
  let saveQueue = Promise.resolve();
  let pendingSave = false;

  function setSyncDot(state){ // 'idle' | 'busy' | 'ok'
    const d = document.getElementById('syncDot'); if(!d) return;
    d.classList.remove('ok','busy'); if(state==='ok') d.classList.add('ok'); else if(state==='busy') d.classList.add('busy');
  }

  async function loadUserDoc(uid){
    const { db, doc, getDoc, setDoc, serverTimestamp } = window.__fb;
    const ref = doc(db, 'users', uid);
    const snap = await getDoc(ref);
    if(snap.exists()){
      const data = snap.data();
      mistakesMem = Array.isArray(data.mistakes) ? data.mistakes.slice() : [];
    } else {
      mistakesMem = [];
      await setDoc(ref, { mistakes: [], login: currentLogin, createdAt: serverTimestamp(), updatedAt: serverTimestamp() });
    }
    setSyncDot('ok');
  }
  function scheduleSave(){
    if(pendingSave) return;
    pendingSave = true;
    setSyncDot('busy');
    saveQueue = saveQueue.then(async ()=>{
      // дать ~400мс, чтобы собрать пачку правок
      await new Promise(r=>setTimeout(r,400));
      pendingSave = false;
      if(!currentUser) return;
      const { db, doc, updateDoc, setDoc, serverTimestamp } = window.__fb;
      const ref = doc(db,'users',currentUser.uid);
      const payload = { mistakes: mistakesMem, updatedAt: serverTimestamp() };
      try { await updateDoc(ref, payload); }
      catch(e){ await setDoc(ref, { ...payload, login: currentLogin, createdAt: serverTimestamp() }, { merge:true }); }
      setSyncDot('ok');
    }).catch(e=>{ console.warn('sync error', e); setSyncDot('idle'); pendingSave=false; });
  }
  function saveMistakes(arr){ mistakesMem = [...new Set(arr)]; scheduleSave(); }
  function addMistake(n){ saveMistakes([...mistakesMem, n]); }
  function removeMistake(n){ saveMistakes(mistakesMem.filter(x => x !== n)); }

  function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
  function qByNum(n){ return ALLQ.find(q => q.n === n); }

  // ---------- состояние прохода ----------
  let order=[], pos=0, answered=false, selected=new Set();
  let sessionCorrect=0, sessionTotal=0, sessionWrong=[], currentMode='exam';

  // ---------- меню ----------
  function refreshMenu(){
    document.getElementById('readyCount').textContent = READY.length;
    document.getElementById('totalCount').textContent = ALLQ.length;
    const m = mistakesMem.filter(n => ANS[n]);
    document.getElementById('mistakesBadge').textContent = m.length ? `Ошибок: ${m.length}` : 'Ошибок пока нет';
  }
  function resetMistakes(){ if(confirm('Очистить список ошибок?')){ saveMistakes([]); refreshMenu(); } }

  // ---------- экзамен: пропорциональная выборка по темам ----------
  function startExam(){
    if(!READY.length){ alert('Пока нет вопросов с ответами.'); return; }
    const byTheme={}; READY.forEach(q => (byTheme[q.t]=byTheme[q.t]||[]).push(q));
    const themes=Object.keys(byTheme);
    const total=READY.length, target=Math.min(EXAM_SIZE,total);
    const alloc={};
    themes.forEach(t => alloc[t]=Math.min(byTheme[t].length, Math.round(target*byTheme[t].length/total)));
    // подгонка суммы под target
    const sum=()=>themes.reduce((s,t)=>s+alloc[t],0);
    while(sum()<target){ // добавить туда, где есть запас
      let best=themes.filter(t=>alloc[t]<byTheme[t].length).sort((a,b)=>byTheme[b].length-byTheme[a].length)[0];
      if(best==null) break; alloc[best]++;
    }
    while(sum()>target){ let best=themes.filter(t=>alloc[t]>0).sort((a,b)=>alloc[b]-alloc[a])[0]; if(best==null)break; alloc[best]--; }
    let picked=[]; themes.forEach(t => picked=picked.concat(shuffle(byTheme[t]).slice(0,alloc[t])));
    order=shuffle(picked).map(q=>q.n);
    beginSession('exam');
  }

  // ---------- тренировка по темам ----------
  function renderThemes(){
    const el=document.getElementById('themeList'); el.innerHTML='';
    const mk=(label,desc,fn)=>{ const b=document.createElement('button'); b.className='mode-btn'; b.onclick=fn;
      b.innerHTML=`<span class="title"></span><span class="desc"></span>`;
      b.querySelector('.title').textContent=label; b.querySelector('.desc').textContent=desc; el.appendChild(b); };
    const readyAll=READY.length;
    mk(`Все темы (${readyAll})`, 'Случайные вопросы из всех тем', ()=>startTheme(0));
    [1,2,3,4,5].forEach(t=>{
      const c=READY.filter(q=>q.t===t).length;
      mk(`Тема ${t}. ${THEMES[t]} (${c})`, c?'Случайные вопросы по теме':'Пока нет вопросов с ответами', ()=>{ if(c) startTheme(t); });
    });
  }
  function startTheme(t){
    const pool = t===0 ? READY : READY.filter(q=>q.t===t);
    if(!pool.length){ alert('В этой теме пока нет вопросов с ответами.'); return; }
    order=shuffle(pool).map(q=>q.n); beginSession('train');
  }

  // ---------- работа над ошибками ----------
  function startMistakes(){
    order=shuffle(mistakesMem.filter(n=>ANS[n] && qByNum(n)));
    if(!order.length){ alert('Список ошибок пуст — сначала порешай вопросы.'); return; }
    beginSession('mistakes');
  }

  function beginSession(mode){ currentMode=mode; pos=0; sessionCorrect=0; sessionTotal=0; sessionWrong=[]; show('quiz'); renderQuestion(); window.scrollTo(0,0); }

  // ---------- отрисовка вопроса ----------
  function renderQuestion(){
    answered=false; selected=new Set();
    const q=qByNum(order[pos]); const a=ANS[q.n];
    document.getElementById('progress').textContent =
      `Вопрос ${pos+1} из ${order.length}` + (sessionTotal?`  ·  верно ${sessionCorrect}/${sessionTotal}`:'');
    document.getElementById('qnum').textContent = `№${q.n} · Тема ${q.t}: ${THEMES[q.t]}`;
    document.getElementById('qtext').textContent = q.q;
    const multi = a.c.length>1;
    document.getElementById('hint').textContent = multi?'Можно выбрать несколько вариантов.':'Выбери один вариант.';
    const optsEl=document.getElementById('options'); optsEl.innerHTML='';
    q.o.forEach((opt,i)=>{
      const div=document.createElement('div'); div.className='opt'; div.dataset.i=i;
      div.innerHTML=`<input type="${multi?'checkbox':'radio'}" name="opt"> <span class="ltr"></span><span class="label"></span>`;
      div.querySelector('.ltr').textContent=LETTERS[i]+'. ';
      div.querySelector('.label').textContent=opt;
      div.onclick=()=>toggle(div,i,multi); optsEl.appendChild(div);
    });
    document.getElementById('verdict').innerHTML='';
    document.getElementById('theory').innerHTML='';
    renderActions();
  }
  function toggle(div,i,multi){
    if(answered) return;
    if(!multi){ selected.clear(); document.querySelectorAll('.opt').forEach(o=>{o.classList.remove('selected'); o.querySelector('input').checked=false;});
      selected.add(i); div.classList.add('selected'); div.querySelector('input').checked=true; }
    else { if(selected.has(i)){ selected.delete(i); div.classList.remove('selected'); div.querySelector('input').checked=false; }
      else { selected.add(i); div.classList.add('selected'); div.querySelector('input').checked=true; } }
    renderActions();
  }
  function renderActions(){
    const el=document.getElementById('actions'); el.innerHTML='';
    const b=document.createElement('button'); b.className='btn';
    if(!answered){ b.textContent='Ответить'; b.disabled=selected.size===0; b.onclick=checkAnswer; }
    else { b.textContent=(pos+1<order.length)?'Следующий вопрос →':'Завершить'; b.onclick=next; }
    el.appendChild(b);
  }
  function checkAnswer(){
    answered=true;
    const q=qByNum(order[pos]); const a=ANS[q.n]; const cs=new Set(a.c);
    const ok = selected.size===cs.size && [...selected].every(i=>cs.has(i));
    document.querySelectorAll('.opt').forEach(div=>{
      const i=+div.dataset.i; div.classList.add('locked'); div.querySelector('input').disabled=true;
      if(cs.has(i)){ div.classList.add('correct'); div.innerHTML+='<span class="mark ok">✓ верно</span>'; }
      else if(selected.has(i)){ div.classList.add('wrong'); div.innerHTML+='<span class="mark no">✗ неверно</span>'; }
    });
    sessionTotal++;
    const v=document.getElementById('verdict');
    if(ok){ sessionCorrect++; v.className='verdict ok'; v.textContent='✓ Правильно!'; if(currentMode==='mistakes') removeMistake(q.n); }
    else { v.className='verdict no'; v.textContent='✗ Неправильно. Правильный ответ: '+a.c.map(i=>LETTERS[i]).join(', '); addMistake(q.n); if(!sessionWrong.includes(q.n)) sessionWrong.push(q.n); }
    if(a.e){ const box=document.createElement('div'); box.className='theory';
      const tt=document.createElement('div'); tt.className='t-title'; tt.textContent='Пояснение';
      const tx=document.createElement('div'); tx.textContent=a.e; box.appendChild(tt); box.appendChild(tx);
      document.getElementById('theory').appendChild(box); }
    document.getElementById('progress').textContent=`Вопрос ${pos+1} из ${order.length}  ·  верно ${sessionCorrect}/${sessionTotal}`;
    renderActions();
  }
  function next(){ if(pos+1<order.length){ pos++; renderQuestion(); window.scrollTo(0,0); } else finish(); }
  function finish(){
    show('result');
    const pct=sessionTotal?Math.round(sessionCorrect/sessionTotal*100):0;
    const p=document.getElementById('resPct'); p.textContent=pct+'%';
    p.style.color = pct>=80?'var(--green)':pct>=50?'#d99100':'var(--red)';
    document.getElementById('resText').textContent=`Правильных ответов: ${sessionCorrect} из ${sessionTotal}.`;
    const rb=document.getElementById('reviewBtn');
    if(sessionWrong.length){ rb.classList.remove('hidden'); rb.onclick=()=>{ order=sessionWrong.slice(); beginSession(currentMode); }; }
    else rb.classList.add('hidden');
  }

  // ---------- все вопросы ----------
  let allFilterTheme=0;
  function showAll(){ show('all'); renderAllFilter(); renderAll(); }
  function renderAllFilter(){
    const el=document.getElementById('allFilter'); el.innerHTML='';
    const mk=(label,t)=>{ const c=document.createElement('span'); c.className='chip'+(allFilterTheme===t?' active':''); c.textContent=label;
      c.onclick=()=>{ allFilterTheme=t; renderAllFilter(); renderAll(); }; el.appendChild(c); };
    mk('Все темы',0); [1,2,3,4,5].forEach(t=>mk('Тема '+t,t));
  }
  function renderAll(){
    const list = (allFilterTheme? READY.filter(q=>q.t===allFilterTheme) : READY).slice().sort((a,b)=>a.n-b.n);
    document.getElementById('allCount').textContent = `Показано: ${list.length}`;
    const el=document.getElementById('allList'); el.innerHTML='';
    list.forEach(q=>{
      const a=ANS[q.n]; const cs=new Set(a.c);
      const wrap=document.createElement('div'); wrap.className='all-q';
      const h=document.createElement('div'); h.className='qh'; h.textContent=`№${q.n}. ${q.q}`; wrap.appendChild(h);
      q.o.forEach((opt,i)=>{ const d=document.createElement('div'); d.className='ao'+(cs.has(i)?' c':'');
        d.textContent=(cs.has(i)?'✓ ':'   ')+LETTERS[i]+'. '+opt; wrap.appendChild(d); });
      if(a.e){ const t=document.createElement('div'); t.className='theory'; t.style.marginTop='10px';
        t.innerHTML='<div class="t-title">Пояснение</div>'; const x=document.createElement('div'); x.textContent=a.e; t.appendChild(x); wrap.appendChild(t); }
      el.appendChild(wrap);
    });
    if(!list.length){ el.innerHTML='<p class="sub">В этой теме пока нет выверенных ответов.</p>'; }
  }

  // ---------- навигация ----------
  function show(id){ ['menu','themes','quiz','result','all'].forEach(s=>document.getElementById(s).classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
    if(id==='menu') refreshMenu(); if(id==='themes') renderThemes(); }
  function goMenu(){ show('menu'); }

  // ---------- логин ----------
  function showLoginErr(msg){ document.getElementById('loginErr').textContent = msg || ''; }
  function setBusyLogin(b){ document.getElementById('loginBtn').disabled = b; document.getElementById('loginBtn').textContent = b?'Входим…':'Войти'; }

  async function doLogin(){
    showLoginErr('');
    const login = (document.getElementById('loginUser').value||'').trim().toLowerCase();
    const pass = document.getElementById('loginPass').value||'';
    const USERS = window.__fb.USERS;
    if(!USERS[login]){ showLoginErr('Неизвестный логин'); return; }
    if(USERS[login].pass !== pass){ showLoginErr('Неверный пароль'); return; }
    setBusyLogin(true);
    const email = login + '@mvko.app';
    const fb = window.__fb;
    // безопасный пароль для Firebase Auth (своя соль + пользовательский пароль)
    const fbPass = 'mvko-' + login + '-' + pass;
    try {
      await fb.signInWithEmailAndPassword(fb.auth, email, fbPass);
    } catch(e){
      if(e.code === 'auth/user-not-found' || e.code === 'auth/invalid-credential' || e.code === 'auth/invalid-login-credentials'){
        try { await fb.createUserWithEmailAndPassword(fb.auth, email, fbPass); }
        catch(e2){ showLoginErr('Ошибка входа: ' + (e2.code||e2.message)); setBusyLogin(false); return; }
      } else { showLoginErr('Ошибка входа: ' + (e.code||e.message)); setBusyLogin(false); return; }
    }
    currentLogin = login;
    setBusyLogin(false);
  }

  async function logout(){
    try { await window.__fb.signOut(window.__fb.auth); } catch{}
    currentUser = null; currentLogin = null; mistakesMem = [];
    document.getElementById('app').classList.add('hidden');
    document.getElementById('login').classList.remove('hidden');
    document.getElementById('loginPass').value = '';
  }
  window.logout = logout;

  function showApp(){
    document.getElementById('login').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    const u = window.__fb.USERS[currentLogin];
    document.getElementById('whoami').textContent = u? u.display : currentLogin;
    show('menu');
  }

  function bindLoginUI(){
    document.getElementById('loginBtn').addEventListener('click', doLogin);
    ['loginUser','loginPass'].forEach(id=>{
      document.getElementById(id).addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
    });
  }

  // ---------- старт ----------
  function bootstrap(){
    bindLoginUI();
    const fb = window.__fb;
    fb.onAuthStateChanged(fb.auth, async (user)=>{
      if(user){
        currentUser = user;
        if(!currentLogin){
          // восстановили сессию: вытаскиваем логин из email
          const email = user.email||''; const local = email.split('@')[0];
          if(fb.USERS[local]) currentLogin = local;
        }
        try { await loadUserDoc(user.uid); }
        catch(e){ console.warn('load failed', e); setSyncDot('idle'); }
        showApp();
      } else {
        currentUser = null; mistakesMem = [];
        document.getElementById('app').classList.add('hidden');
        document.getElementById('login').classList.remove('hidden');
      }
    });
  }
  if(window.__fb) bootstrap(); else window.addEventListener('fb-ready', bootstrap, { once:true });
</script>
</body>
